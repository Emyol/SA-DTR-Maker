<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DTR Helper{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container {% block container_class %}{% endblock %}">
    <header class="site-header">
      <h1><a href="{{ url_for('dtr.index') }}" style="color:inherit;text-decoration:none;">DTR Helper</a></h1>
      <p>Fill the Student Assistant Daily Time Record from a time-log spreadsheet.</p>
    </header>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
